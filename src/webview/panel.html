<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header class="toolbar">
    <button id="btn-library" class="mode-btn active">Library</button>
    <button id="btn-reference" class="mode-btn">Reference</button>
  </header>

  <div class="search-bar">
    <input id="search-input" type="text" placeholder="Search citations..." />
  </div>

  <div class="locator-bar">
    <select id="locator-type">
      <option value="">—</option>
      <option value="p.">p.</option>
      <option value="pp.">pp.</option>
      <option value="ch.">ch.</option>
      <option value="sec.">sec.</option>
      <option value="fig.">fig.</option>
      <option value="eq.">eq.</option>
      <option value="table">table</option>
      <option value="vol.">vol.</option>
      <option value="note">note</option>
    </select>
    <input id="locator-value" type="text" placeholder="locator value" />
  </div>

  <ol id="entry-list" class="entry-list"></ol>

  <p id="loading-msg" class="empty-msg">Loading bibliography...</p>
  <p id="empty-msg" class="empty-msg hidden">No citations found.</p>
  <p id="no-bib-msg" class="empty-msg hidden">Set citation.bibliography in settings to load a database.</p>

  <footer class="export-bar">
    <button id="btn-export" class="export-btn">📦 Export DOCX</button>
  </footer>

  <script src="panel.js"></script>
</body>
</html>
